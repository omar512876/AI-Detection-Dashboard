<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detection Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>AI Detection Dashboard</h1>
        <p class="subtitle">Paste your text below to analyze it</p>

        <form id="analyze-form">
            <label for="input-text" class="sr-only">Text to analyze</label>
            <textarea id="input-text" name="text" rows="8" placeholder="Paste your text here..."></textarea>
            <button type="submit">Analyze</button>
        </form>

        <div id="result" class="result-section"></div>
    </div>

    <script>
        document.getElementById("analyze-form").addEventListener("submit", function (e) {
            e.preventDefault();
            var text = document.getElementById("input-text").value.trim();
            var result = document.getElementById("result");
            if (!text) {
                result.classList.remove("visible");
                return;
            }
            result.textContent = "Analysis pending…";
            result.classList.add("visible");
        });
    </script>
</body>
</html>
